<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vòng Quay May Mắn</title>
    
    <!-- Thư viện hiệu ứng -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #ff4757;
            --gold: #f1c40f;
            --bg-gradient: linear-gradient(135deg, #1e3799, #111);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        /* Thanh trạng thái lượt quay */
        .status-bar {
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .wheel-outer {
            position: relative;
            width: 90vmin;
            height: 90vmin;
            max-width: 450px;
            max-height: 450px;
            padding: 12px;
            background: radial-gradient(circle, #555, #111);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px var(--gold);
            border: 6px solid #333;
        }

        /* Kim chỉ ở hướng 12 giờ */
        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 55px;
            background: var(--gold);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
            border-bottom: 2px solid white;
        }

        #wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
            background-color: #fff;
        }

        .controls { margin-top: 30px; }

        #btn-spin {
            padding: 18px 60px;
            border: none;
            border-radius: 50px;
            font-size: 24px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.5);
            transition: all 0.3s;
            display: block;
        }

        #btn-spin:active { transform: scale(0.92); }
        
        /* Hiệu ứng khi nút bị vô hiệu hóa */
        #btn-spin:disabled { 
            background: linear-gradient(45deg, #555, #777) !important; 
            cursor: not-allowed; 
            box-shadow: none;
            opacity: 0.8;
        }

        .vibrate { animation: vibrate 0.1s linear 8; }
        @keyframes vibrate {
            0% { transform: translate(0); }
            25% { transform: translate(-3px, 3px); }
            50% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div class="status-bar" id="turn-display">Đang tải lượt...</div>

    <div class="wheel-outer" id="main-container">
        <div class="pointer"></div>
        <canvas id="wheel-canvas" width="800" height="800"></canvas>
    </div>

    <div class="controls">
        <button id="btn-spin" onclick="spinWheel()">QUAY NGAY</button>
    </div>

    <!-- Âm thanh -->
    <audio id="sound-tick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="sound-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script>
        // 1. CẤU HÌNH PHẦN THƯỞNG & XÁC SUẤT
        const prizes = [
            { text: "một heo miếng nướng", color: "#e74c3c", probability: 20 },
            { text: "một kẹo dâu yumyum", color: "#f39c12", probability: 20 },
            { text: "chúc bạn may mắn lần sau", color: "#7f8c8d", probability: 25 },
            { text: "một thìa chà bông heo ủn ỉn", color: "#9b59b6", probability: 25 },
            { text: "một kẹo dâu yumyum và thêm 1 lượt", color: "#27ae60", probability: 10 }
        ];

        const MAX_TURNS = 4;
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const btnSpin = document.getElementById('btn-spin');
        const soundTick = document.getElementById('sound-tick');
        const soundWin = document.getElementById('sound-win');

        let currentRotation = 0;
        let isSpinning = false;
        const numPrizes = prizes.length;
        const arcSize = (Math.PI * 2) / numPrizes;

        // 2. VẼ VÒNG QUAY
        function drawWheel() {
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numPrizes; i++) {
                const angle = i * arcSize;
                
                // Vẽ miếng bánh
                ctx.beginPath();
                ctx.fillStyle = prizes[i].color;
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius - 10, angle, angle + arcSize);
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 4;
                ctx.stroke();

                // Vẽ chữ
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 30px Montserrat";
                
                const text = prizes[i].text;
                const words = text.split(' ');
                // Tự động xuống dòng cho text dài
                if(words.length > 3) {
                    ctx.fillText(words.slice(0, 3).join(' '), radius - 50, -15);
                    ctx.fillText(words.slice(3).join(' '), radius - 50, 25);
                } else {
                    ctx.fillText(text, radius - 50, 10);
                }
                ctx.restore();
            }
        }

        // 3. QUẢN LÝ LƯỢT CHƠI (LocalStorage)
        function getTurnData() {
            const today = new Date().toDateString();
            let data = JSON.parse(localStorage.getItem('lucky_spin_v3'));
            if (!data || data.date !== today) {
                data = { date: today, count: 0 };
                localStorage.setItem('lucky_spin_v3', JSON.stringify(data));
            }
            return data;
        }

        function updateUI() {
            const data = getTurnData();
            const remains = MAX_TURNS - data.count;
            document.getElementById('turn-display').innerText = `Lượt hôm nay: ${remains}/${MAX_TURNS}`;
            
            if (remains <= 0) {
                btnSpin.disabled = true;
                btnSpin.innerText = "HẾT LƯỢT";
            } else {
                if (!isSpinning) {
                    btnSpin.disabled = false;
                    btnSpin.innerText = "QUAY NGAY";
                }
            }
        }

        // 4. LOGIC XÁC SUẤT
        function getWinnerIndex() {
            const rand = Math.random() * 100;
            let sum = 0;
            for (let i = 0; i < prizes.length; i++) {
                sum += prizes[i].probability;
                if (rand <= sum) return i;
            }
            return 0;
        }

        // 5. HÀNH ĐỘNG QUAY
        function spinWheel() {
            const data = getTurnData();
            if (data.count >= MAX_TURNS || isSpinning) return;

            isSpinning = true;
            btnSpin.disabled = true; // Khóa nút ngay lập tức
            btnSpin.innerText = "ĐANG QUAY...";

            const winnerIndex = getWinnerIndex();
            
            // Tính toán góc quay để dừng chính xác ở kim 12h
            const extraSpins = (Math.floor(Math.random() * 4) + 7) * 360; // Quay 7-10 vòng
            const prizeCenterAngle = (winnerIndex * (360 / numPrizes)) + (360 / numPrizes / 2);
            const stopAngle = 270 - prizeCenterAngle; 
            
            // Cập nhật rotation tiếp nối từ vị trí cũ
            currentRotation += extraSpins + (stopAngle - (currentRotation % 360)) + 360;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Hiệu ứng âm thanh tạch tạch
            let lastIdx = -1;
            const ticker = setInterval(() => {
                const matrix = new WebKitCSSMatrix(window.getComputedStyle(canvas).transform);
                const angle = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
                const normAngle = (angle < 0 ? angle + 360 : angle);
                const currentIdx = Math.floor(((270 - normAngle + 360) % 360) / (360 / numPrizes));
                
                if (currentIdx !== lastIdx) {
                    soundTick.currentTime = 0;
                    soundTick.play().catch(()=>{});
                    lastIdx = currentIdx;
                }
            }, 50);

            // Kết thúc quay
            setTimeout(() => {
                clearInterval(ticker);
                finishSpin(winnerIndex);
            }, 6100);
        }

        function finishSpin(idx) {
            isSpinning = false;
            const prize = prizes[idx];
            let data = getTurnData();

            // Rung lắc và pháo giấy
            document.getElementById('main-container').classList.add('vibrate');
            soundWin.play();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            // Xử lý lượt quay: Nếu trúng ô thêm lượt thì không tăng count
            if (!prize.text.includes("thêm 1 lượt")) {
                data.count++;
                localStorage.setItem('lucky_spin_v3', JSON.stringify(data));
            }

            setTimeout(() => {
                document.getElementById('main-container').classList.remove('vibrate');
                
                Swal.fire({
                    title: '🎉 CHÚC MỪNG!',
                    html: `Bạn nhận được:<br><b style="color:#ff4757; font-size:1.4em">${prize.text}</b>`,
                    confirmButtonText: 'Đóng',
                    confirmButtonColor: '#ff4757',
                    allowOutsideClick: false
                }).then(() => {
                    // SAU KHI ĐÓNG POPUP: Cập nhật lại nút bấm
                    updateUI();
                });
            }, 500);
        }

        // Khởi tạo ban đầu
        drawWheel();
        updateUI();
    </script>
</body>
</html>
