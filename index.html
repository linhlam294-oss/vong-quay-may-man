<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vòng Quay May Mắn</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #ff4757;
            --bg-dark: #0f0c29;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --gold: #f1c40f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        .status-bar {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .wheel-container {
            position: relative;
            width: 90vmin;
            height: 90vmin;
            max-width: 450px;
            max-height: 450px;
            padding: 10px;
            background: radial-gradient(circle, #444, #111);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px var(--gold);
            border: 5px solid #333;
        }

        /* Kim chỉ ở hướng 12 giờ */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: var(--gold);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
        }

        #wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .controls { margin-top: 30px; }

        #btn-spin {
            padding: 18px 60px;
            border: none;
            border-radius: 50px;
            font-size: 22px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4);
            transition: all 0.3s;
        }

        #btn-spin:active { transform: scale(0.95); }
        #btn-spin:disabled { background: #555; opacity: 0.7; box-shadow: none; }

        .vibrate { animation: vibrate 0.1s linear 8; }
        @keyframes vibrate {
            0% { transform: translate(0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div class="status-bar" id="turn-display">Lượt hôm nay: 4/4</div>

    <div class="wheel-container" id="main-container">
        <div class="pointer"></div>
        <canvas id="wheel-canvas" width="800" height="800"></canvas>
    </div>

    <div class="controls">
        <button id="btn-spin" onclick="spinWheel()">QUAY NGAY</button>
    </div>

    <audio id="sound-tick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="sound-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script>
        // Cấu hình quà tặng (Duy trì đúng 5 ô như danh sách bạn cung cấp)
        const prizes = [
            { text: "một heo miếng nướng", color: "#e74c3c", probability: 20 },
            { text: "một kẹo dâu yumyum", color: "#f39c12", probability: 20 },
            { text: "chúc bạn may mắn lần sau", color: "#7f8c8d", probability: 25 },
            { text: "một thìa chà bông heo ủn ỉn", color: "#9b59b6", probability: 25 },
            { text: "kẹo dâu và thêm 1 lượt", color: "#27ae60", probability: 10 }
        ];

        const MAX_TURNS = 4;
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const btnSpin = document.getElementById('btn-spin');
        const soundTick = document.getElementById('sound-tick');
        const soundWin = document.getElementById('sound-win');

        let currentRotation = 0;
        let isSpinning = false;
        const numPrizes = prizes.length;
        const arcSize = (Math.PI * 2) / numPrizes;

        // Vẽ vòng quay
        function drawWheel() {
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numPrizes; i++) {
                const angle = i * arcSize;
                
                // Vẽ miếng bánh
                ctx.beginPath();
                ctx.fillStyle = prizes[i].color;
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius - 10, angle, angle + arcSize);
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 4;
                ctx.stroke();

                // Vẽ chữ
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 32px Montserrat";
                
                const text = prizes[i].text;
                const words = text.split(' ');
                if(words.length > 3) {
                    ctx.fillText(words.slice(0, 3).join(' '), radius - 50, -15);
                    ctx.fillText(words.slice(3).join(' '), radius - 50, 25);
                } else {
                    ctx.fillText(text, radius - 50, 10);
                }
                ctx.restore();
            }
        }

        // Logic xác suất
        function getPrizeIndexByProbability() {
            const rand = Math.random() * 100;
            let sum = 0;
            for (let i = 0; i < prizes.length; i++) {
                sum += prizes[i].probability;
                if (rand <= sum) return i;
            }
            return 0;
        }

        // Quản lý lượt chơi
        function checkTurns() {
            const today = new Date().toDateString();
            let data = JSON.parse(localStorage.getItem('spin_data')) || { date: today, count: 0 };
            if (data.date !== today) data = { date: today, count: 0 };
            return data;
        }

        function spinWheel() {
            let data = checkTurns();
            if (data.count >= MAX_TURNS) {
                Swal.fire("Hết lượt", "Bạn đã quay hết 4 lượt hôm nay!", "warning");
                return;
            }

            if (isSpinning) return;
            isSpinning = true;
            btnSpin.disabled = true;

            const prizeIndex = getPrizeIndexByProbability();
            
            // TÍNH TOÁN GÓC DỪNG CHÍNH XÁC:
            // 1. Canvas vẽ ô 0 bắt đầu từ 0 độ (hướng 3 giờ).
            // 2. Kim chỉ (Pointer) ở hướng 12 giờ (tương đương 270 độ).
            // 3. Cần đưa tâm ô trúng thưởng về vị trí 270 độ.
            
            const extraSpins = (Math.floor(Math.random() * 5) + 6) * 360; // Quay 6-10 vòng
            const prizeCenterAngle = (prizeIndex * (360 / numPrizes)) + (360 / numPrizes / 2);
            const stopAngle = 270 - prizeCenterAngle; 
            
            currentRotation += extraSpins + (stopAngle - (currentRotation % 360)) + 360;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Âm thanh tick tick
            let lastIdx = -1;
            const ticker = setInterval(() => {
                const matrix = new WebKitCSSMatrix(window.getComputedStyle(canvas).transform);
                const angle = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
                const normalizedAngle = (angle < 0 ? angle + 360 : angle);
                const currentIdx = Math.floor(((270 - normalizedAngle + 360) % 360) / (360 / numPrizes));
                
                if (currentIdx !== lastIdx) {
                    soundTick.currentTime = 0;
                    soundTick.play().catch(()=>{});
                    lastIdx = currentIdx;
                }
            }, 50);

            setTimeout(() => {
                clearInterval(ticker);
                isSpinning = false;
                
                // Hiệu ứng thắng
                document.getElementById('main-container').classList.add('vibrate');
                soundWin.play();
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

                // Cập nhật lượt chơi
                if (!prizes[prizeIndex].text.includes("thêm 1 lượt")) {
                    data.count++;
                    localStorage.setItem('spin_data', JSON.stringify(data));
                }
                
                setTimeout(() => {
                    document.getElementById('main-container').classList.remove('vibrate');
                    Swal.fire({
                        title: '🎉 CHÚC MỪNG!',
                        html: `Bạn nhận được:<br><b style="color:#ff4757; font-size:1.4em">${prizes[prizeIndex].text}</b>`,
                        confirmButtonText: 'Đóng',
                        confirmButtonColor: '#ff4757'
                    });
                    updateTurnDisplay();
                }, 500);
            }, 6100);
        }

        function updateTurnDisplay() {
            const data = checkTurns();
            const remains = MAX_TURNS - data.count;
            document.getElementById('turn-display').innerText = `Lượt hôm nay: ${remains}/${MAX_TURNS}`;
            if (remains <= 0) {
                btnSpin.disabled = true;
                btnSpin.innerText = "HẾT LƯỢT";
            }
        }

        drawWheel();
        updateTurnDisplay();
    </script>
</body>
</html>
